[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prediction-market-sdk"
version = "0.2.0"
description = "HFT-grade Python SDK for Kalshi and Polymarket. Zero-allocation parsing via msgspec."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"

dependencies = [
    "msgspec>=0.18.0",
    "httpx>=0.27.0",
    "uvloop>=0.19.0; sys_platform != 'win32'",
    "websockets>=12.0"
]
